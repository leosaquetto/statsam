name: Stats.fm - Dados Rápidos

on:
  schedule:
    - cron: '*/5 * * * *'  # A cada 5 minutos
  workflow_dispatch:

# 🔥 Garante que apenas um workflow roda por vez
concurrency:
  group: statsfm-rapido
  cancel-in-progress: false

jobs:
  update-rapido:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Baixar código
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Instalar dependências
        run: pip install requests
      
      - name: 🤖 Executar coleta rápida
        run: python statsfm_rapido.py
      
      - name: 💾 Salvar dados no repositório
        run: |
          git config --global user.email "bot@leouol.com"
          git config --global user.name "StatsFM Bot"
          
          git add statsfm_rapido.json
          
          if git diff --staged --quiet; then
            echo "📊 Dados não mudaram"
          else
            git commit -m "🤖 Atualiza dados rápidos [skip ci]"
            
            # 🔥 Tenta push, se falhar, puxa e tenta de novo
            for i in {1..3}; do
              if git push; then
                echo "✅ JSON atualizado!"
                break
              else
                echo "⚠️ Tentativa $i falhou, puxando alterações..."
                git pull --rebase origin main
                sleep 2
              fi
            done
          fi
