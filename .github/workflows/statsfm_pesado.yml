name: Stats.fm - Dados Pesados

on:
  schedule:
    - cron: '17 */3 * * *'
  workflow_dispatch:

concurrency:
  group: statsfm-pesado
  cancel-in-progress: false

jobs:
  update-pesado:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: baixar código
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: configurar python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: instalar dependências
        run: pip install requests

      - name: executar coleta pesada
        run: python statsfm_pesado.py

      - name: salvar dados no repositório
        run: |
          git config --global user.email "bot@leouol.com"
          git config --global user.name "StatsFM Bot"

          git add statsfm_pesado.json

          if git diff --staged --quiet; then
            echo "dados não mudaram"
            exit 0
          fi

          git commit -m "🤖 atualiza dados pesados [skip ci]"

          for i in 1 2 3; do
            if git push; then
              echo "json atualizado"
              exit 0
            fi

            echo "tentativa $i falhou, puxando alterações..."
            git pull --rebase origin main
            sleep 2
          done

          echo "falha ao enviar após 3 tentativas"
          exit 1
