name: Stats.fm - Dados Pesados

on:
  schedule:
    - cron: '0 */6 * * *'  # A cada 6 horas
  workflow_dispatch:

jobs:
  update-pesado:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Instalar dependências
        run: pip install requests
      
      - name: Executar coleta pesada
        run: python statsfm_pesado.py
      
      - name: Commit e push
        run: |
          git config --global user.email "bot@leouol.com"
          git config --global user.name "StatsFM Bot"
          git add statsfm_pesado.json
          if git diff --staged --quiet; then
            echo "📊 Dados não mudaram"
          else
            git commit -m "🤖 Atualiza dados pesados [skip ci]"
            git push
            echo "✅ JSON atualizado!"
          fi
