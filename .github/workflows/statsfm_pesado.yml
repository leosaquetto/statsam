name: Stats.fm - Dados Pesados

on:
  schedule:
    - cron: '0 */3 * * *'  # ✅ A cada 3 horas
  workflow_dispatch:

concurrency:
  group: statsfm-pesado
  cancel-in-progress: false

jobs:
  update-pesado:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Baixar código
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Instalar dependências
        run: pip install requests
      
      - name: 🤖 Executar coleta pesada
        run: python statsfm_pesado.py
      
      - name: 💾 Salvar dados no repositório
        run: |
          git config --global user.email "bot@leouol.com"
          git config --global user.name "StatsFM Bot"
          
          git add statsfm_pesado.json
          
          if git diff --staged --quiet; then
            echo "📊 Dados não mudaram"
          else
            git commit -m "🤖 Atualiza dados pesados [skip ci]"
            
            for i in {1..3}; do
              if git push; then
                echo "✅ JSON atualizado!"
                break
              else
                echo "⚠️ Tentativa $i falhou, puxando alterações..."
                git pull --rebase origin main
                sleep 2
              fi
            done
          fi
